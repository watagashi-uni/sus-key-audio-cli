name: Build And Release

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh g++ g++-aarch64-linux-gnu

      - name: Build
        run: |
          mkdir -p dist
          if [ "${{ matrix.arch }}" = "x64" ]; then
            CXX=g++ ./scripts/build.sh
            cp ./bin/render-key-audio ./dist/render-key-audio-linux-x64
          else
            aarch64-linux-gnu-g++ -std=c++20 -O2 -Wall -Wextra \
              -o ./dist/render-key-audio-linux-arm64 ./src/main.cpp
          fi

      - name: Smoke test (native x64 only)
        if: matrix.arch == 'x64'
        run: ./dist/render-key-audio-linux-x64 --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: render-key-audio-linux-${{ matrix.arch }}
          path: ./dist/render-key-audio-linux-${{ matrix.arch }}
          if-no-files-found: error

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          mkdir -p dist
          if [ "${{ matrix.arch }}" = "x64" ]; then
            clang++ -std=c++20 -O2 -Wall -Wextra -arch x86_64 \
              -o ./dist/render-key-audio-macos-x64 ./src/main.cpp
          else
            clang++ -std=c++20 -O2 -Wall -Wextra -arch arm64 \
              -o ./dist/render-key-audio-macos-arm64 ./src/main.cpp
          fi

      - name: Smoke test
        if: matrix.arch == 'arm64'
        run: ./dist/render-key-audio-macos-${{ matrix.arch }} --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: render-key-audio-macos-${{ matrix.arch }}
          path: ./dist/render-key-audio-macos-${{ matrix.arch }}
          if-no-files-found: error

  build-windows:
    name: Build Windows (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            vc_arch: x64
          - arch: arm64
            vc_arch: amd64_arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.vc_arch }}

      - name: Build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          cl /std:c++20 /O2 /EHsc /W4 /nologo `
            /Fe:dist\render-key-audio-windows-${{ matrix.arch }}.exe `
            src\main.cpp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: render-key-audio-windows-${{ matrix.arch }}
          path: ./dist/render-key-audio-windows-${{ matrix.arch }}.exe
          if-no-files-found: error

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-linux
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/**/render-key-audio-linux-*
            release-assets/**/render-key-audio-macos-*
            release-assets/**/render-key-audio-windows-*.exe
